name: Security & SAST Audit

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sundays

permissions:
  contents: read

jobs:
  security-audit:
    name: Full Stack Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend NPM Audit (High/Critical only)
        working-directory: ./frontend
        run: npm audit --audit-level=high || echo "High/Critical npm vulnerabilities found — review required."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Security Tools
        run: pip install bandit safety

      - name: Bandit SAST — Backend
        working-directory: ./backend
        # -lll = High confidence + High severity only (ignores low-noise warnings)
        run: bandit -r . -lll --exclude ./tests || echo "Backend SAST warnings found — review required."

      - name: Bandit SAST — Chatbot Service
        working-directory: ./chatbot_service
        run: bandit -r . -lll --exclude ./tests || echo "Chatbot SAST warnings found — review required."

      - name: Safety — Backend Dependency CVE Scan
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt || echo "Safety CVE warnings — review required."
          fi

      - name: Safety — Chatbot Dependency CVE Scan
        working-directory: ./chatbot_service
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt || echo "Safety CVE warnings — review required."
          fi
