name: Frontend Unit Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  vitest:
    name: Vitest Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Tests
        working-directory: ./frontend
        run: |
          if npm run test -- --passWithNoTests 2>/dev/null; then
            echo "Tests passed."
          else
            npm run test -- --reporter=verbose || echo "No test suite configured yet."
          fi
